# .github/workflows/build-gcc-ios.yml
name: build-gcc-ios-aarch64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    name: Build GCC on macOS
    runs-on: macos-latest
    timeout-minutes: 720
    env:
      GCC_VERSION: "15.2"
      GMP_VERSION: "6.2.1"
      MPFR_VERSION: "4.2.1"
      MPC_VERSION: "1.2.1"
      ISL_VERSION: "0.25"
      TARGET: "aarch64-apple-ios"
      PREFIX: "/usr/local/gcc-ios"
      DESTDIR_REL: "installroot"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Homebrew deps
        run: |
          brew update
          brew install autoconf automake libtool gawk gmp mpfr libmpc isl python@3 bison texinfo wget cmake pkg-config

      - name: Show environment (debug)
        run: |
          sw_vers
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path
          echo "CPU cores: $(sysctl -n hw.ncpu)"
          which clang || true
          clang --version || true

      - name: Get SDK path
        id: sdk
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "sdk_path=$SDK" >> $GITHUB_OUTPUT
          ls -la "$SDK"

      - name: Prepare variables
        id: vars
        run: |
          CORES=$(sysctl -n hw.ncpu || echo 2)
          echo "cores=$CORES" >> $GITHUB_OUTPUT

      - name: Download sources (GCC + prereqs) and place in-tree
        run: |
          set -euo pipefail
          mkdir -p thirdparty
          cd thirdparty
          echo "Downloading GCC ${GCC_VERSION}..."
          curl -L -o gcc.tar.xz "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz"
          tar xf gcc.tar.xz
          mv gcc-${GCC_VERSION} gcc-src
          # In-tree prerequisites to reduce ABI/version mismatch
          curl -L -o gmp.tar.xz "https://gmplib.org/download/gmp/gmp-${GMP_VERSION}.tar.xz"
          tar xf gmp.tar.xz
          mv gmp-${GMP_VERSION} gcc-src/gmp
          curl -L -o mpfr.tar.xz "https://www.mpfr.org/mpfr-current/mpfr-${MPFR_VERSION}.tar.xz"
          tar xf mpfr.tar.xz
          mv mpfr-${MPFR_VERSION} gcc-src/mpfr
          curl -L -o mpc.tar.gz "https://ftp.gnu.org/gnu/mpc/mpc-${MPC_VERSION}.tar.gz"
          tar xf mpc.tar.gz
          mv mpc-${MPC_VERSION} gcc-src/mpc
          curl -L -o isl.tar.xz "https://libisl.sourceforge.io/isl-${ISL_VERSION}.tar.xz"
          tar xf isl.tar.xz
          mv isl-${ISL_VERSION} gcc-src/isl
          cd ..

      - name: Prepare build dir
        run: |
          rm -rf build || true
          mkdir -p build
          cd build
          ls -la ../thirdparty/gcc-src || true

      - name: Configure GCC (stage1)
        run: |
          set -euo pipefail
          SDK="${{ steps.sdk.outputs.sdk_path }}"
          CORES="${{ steps.vars.outputs.cores }}"
          echo "Using SDK: $SDK"
          cd build
          export CC="$(xcrun --sdk iphoneos -f clang)"
          export CXX="$(xcrun --sdk iphoneos -f clang++)"
          export SDKROOT="$SDK"
          export CFLAGS="-isysroot ${SDK} -O2 -pipe -fPIC -fno-common"
          export CXXFLAGS="$CFLAGS -std=gnu++17"
          export LDFLAGS="-isysroot ${SDK} -Wl,-syslibroot,${SDK}"
          export AS="$(xcrun --sdk iphoneos -f as)"
          export LD="$(xcrun --sdk iphoneos -f ld)"
          # Configure; keep options conservative to reduce failures
          ../thirdparty/gcc-src/configure \
            --target=${{ env.TARGET }} \
            --prefix=${{ env.PREFIX }} \
            --with-sysroot="${SDK}" \
            --enable-languages=c,c++ \
            --disable-multilib \
            --disable-nls \
            --disable-bootstrap \
            --disable-libssp \
            --disable-libquadmath \
            --disable-libgomp \
            --disable-libvtv \
            --disable-libmudflap \
            --enable-threads=posix \
            --with-gmp=../thirdparty/gcc-src/gmp \
            --with-mpfr=../thirdparty/gcc-src/mpfr \
            --with-mpc=../thirdparty/gcc-src/mpc \
            --with-isl=../thirdparty/gcc-src/isl \
            --with-as="$AS" --with-ld="$LD" \
            CC="$CC" CXX="$CXX" CFLAGS="$CFLAGS" CXXFLAGS="$CXXFLAGS" LDFLAGS="$LDFLAGS"

      - name: Build GCC (stage1)
        run: |
          set -euo pipefail
          cd build
          CORES="${{ steps.vars.outputs.cores }}"
          echo "Starting make with ${CORES} cores..."
          # build only compiler & libgcc first to reduce time
          MAKEFLAGS="-j${CORES}"
          make all-gcc ${MAKEFLAGS} 2>&1 | tee build_all_gcc.log || ( tail -n 200 build_all_gcc.log || true; false )
          make install-gcc DESTDIR=$PWD/${{ env.DESTDIR_REL }} 2>&1 | tee build_install_gcc.log || ( tail -n 200 build_install_gcc.log || true; false )
          # build target libgcc (minimal)
          make all-target-libgcc ${MAKEFLAGS} 2>&1 | tee build_libgcc.log || ( tail -n 200 build_libgcc.log || true; false )
          make install-target-libgcc DESTDIR=$PWD/${{ env.DESTDIR_REL }} 2>&1 | tee build_install_libgcc.log || ( tail -n 200 build_install_libgcc.log || true; false )

      - name: Collect artifact (installroot)
        uses: actions/upload-artifact@v4
        with:
          name: gcc-ios-install
          path: build/${{ env.DESTDIR_REL }}

      - name: Package tar.gz (for quick download)
        run: |
          cd build/${{ env.DESTDIR_REL }}
          tar -czf ../../gcc-ios-${GCC_VERSION}-${{ github.run_id }}.tar.gz .
          cd ../..
      - name: Upload final tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcc-ios-tar
          path: build/gcc-ios-${GCC_VERSION}-${{ github.run_id }}.tar.gz

  package-deb:
    name: Package .deb (ubuntu)
    runs-on: ubuntu-latest
    needs: build-macos
    timeout-minutes: 60
    steps:
      - name: Download build artifact (installroot)
        uses: actions/download-artifact@v4
        with:
          name: gcc-ios-install
          path: ./artifact

      - name: Prepare packaging tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ruby ruby-dev build-essential fakeroot dpkg-dev \
             rpm dpkg-dev
          sudo gem install --no-document fpm

      - name: Inspect installroot
        run: |
          echo "Listing artifact tree (first 6 levels):"
          find artifact -maxdepth 6 -type f -ls || true

      - name: Create minimal control and package with fpm
        run: |
          set -euo pipefail
          VERSION="${{ env.GCC_VERSION }}"
          PKGNAME="gcc-ios"
          if [ ! -d artifact/usr/local/gcc-ios ]; then
            echo "expected artifact/usr/local/gcc-ios missing; listing artifact root:"
            find artifact -maxdepth 6 -ls
            exit 1
          fi
          # Use fpm to create deb rooted at /usr/local/gcc-ios
          fpm -s dir -t deb -n "${PKGNAME}" -v "${VERSION}" --architecture arm64 \
            --description "Cross-built GCC for aarch64-apple-ios (prefix /usr/local/gcc-ios)" \
            -C artifact usr/local/gcc-ios
          mkdir -p out
          mv *.deb out/ || true

      - name: Zip .deb for download
        run: |
          mkdir -p release
          cp out/*.deb release/ || true
          zip -r release/gcc-ios-${{ env.GCC_VERSION }}-deb.zip release/*.deb || true

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-deb
          path: release
