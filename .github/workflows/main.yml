# .github/workflows/build-gcc-ios.yml
name: build-gcc-ios-aarch64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gcc-ios-build
  cancel-in-progress: true

env:
  GCC_VERSION: "15.2.0"
  GMP_VERSION: "6.2.1"
  MPFR_VERSION: "4.2.1"
  MPC_VERSION: "1.2.1"
  ISL_VERSION: "0.25"
  TARGET: "aarch64-apple-ios"
  PREFIX: "/usr/local/gcc-ios"
  DESTDIR_REL: "installroot"

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew deps + ccache
        run: |
          set -euo pipefail
          brew update
          # install required libs (gmp/mpfr/libmpc/isl from brew for reliable detection)
          brew install autoconf automake libtool gawk gmp mpfr libmpc isl \
                       python@3 bison texinfo wget cmake pkg-config xz ccache ruby

      - name: Setup ccache
        run: |
          set -euo pipefail
          mkdir -p ~/.ccache
          echo "max_size = 2.0G" > ~/.ccache/ccache.conf || true
          ccache -s || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-gcc-${{ env.GCC_VERSION }}
          restore-keys: |
            ccache-${{ runner.os }}-gcc-

      - name: Restore thirdparty cache
        uses: actions/cache@v4
        with:
          path: thirdparty
          key: thirdparty-${{ runner.os }}-gcc-${{ env.GCC_VERSION }}
          restore-keys: |
            thirdparty-${{ runner.os }}-gcc-

      - name: Get iOS SDK path
        id: sdk
        run: |
          set -euo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "sdk=$SDK" >> $GITHUB_OUTPUT
          echo "SDK path: $SDK"
          ls -la "$SDK" || true

      - name: Cap cores (safe)
        id: cores
        run: |
          set -euo pipefail
          HOST_CORES=$(sysctl -n hw.ncpu || echo 2)
          CORES="$HOST_CORES"
          if [ "$CORES" -gt 2 ]; then CORES=2; fi
          echo "cores=$CORES" >> $GITHUB_OUTPUT
          echo "host_cores=$HOST_CORES" >> $GITHUB_OUTPUT

      - name: Gather brew prefixes (gmp/mpfr/libmpc/isl)
        id: brew_prefixes
        run: |
          set -euo pipefail
          # Use brew --prefix to find correct location on ARM/Intel runners
          GMP_PREFIX=$(brew --prefix gmp 2>/dev/null || echo "")
          MPFR_PREFIX=$(brew --prefix mpfr 2>/dev/null || echo "")
          MPC_PREFIX=$(brew --prefix libmpc 2>/dev/null || echo "")
          ISL_PREFIX=$(brew --prefix isl 2>/dev/null || echo "")

          echo "gmp_prefix=$GMP_PREFIX" >> $GITHUB_OUTPUT
          echo "mpfr_prefix=$MPFR_PREFIX" >> $GITHUB_OUTPUT
          echo "mpc_prefix=$MPC_PREFIX" >> $GITHUB_OUTPUT
          echo "isl_prefix=$ISL_PREFIX" >> $GITHUB_OUTPUT

          echo "Found prefixes:"
          echo "GMP: $GMP_PREFIX"
          echo "MPFR: $MPFR_PREFIX"
          echo "MPC: $MPC_PREFIX"
          echo "ISL: $ISL_PREFIX"

      - name: Download GCC + (in-tree fallback) prerequisites (robust)
        run: |
          set -euo pipefail
          mkdir -p thirdparty
          cd thirdparty

          download_and_extract() {
            namestr="$1"
            out="$2"
            shift 2
            urls=("$@")
            echo "==> download_and_extract: ${namestr}"
            for url in "${urls[@]}"; do
              echo "Trying URL: $url"
              if curl -fL --retry 6 --retry-connrefused --retry-delay 5 \
                    --connect-timeout 15 --max-time 300 -o "$out" "$url"; then
                echo "Downloaded $out from $url"
                if tar -tf "$out" >/dev/null 2>&1; then
                  echo "Archive valid; extracting..."
                  tar -xf "$out"
                  rm -f "$out" || true
                  return 0
                else
                  echo "Downloaded file $out is not a valid tar archive; inspecting..."
                  file "$out" || true
                  head -c 512 "$out" | sed -n '1,200p' || true
                  rm -f "$out" || true
                fi
              else
                echo "curl failed for $url; trying next mirror..."
                rm -f "$out" || true
                sleep 2
              fi
            done
            echo "ERROR: All mirrors failed for ${namestr}"
            return 1
          }

          if [ ! -d "gcc-src" ]; then
            download_and_extract "GCC ${GCC_VERSION}" "gcc.tar.xz" \
              "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz" \
              "https://mirrors.kernel.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz"
            mv "gcc-${GCC_VERSION}" gcc-src
          else
            echo "gcc-src exists - using cache"
          fi

          # Optional: still fetch in-tree copies as fallback if brew detection fails
          if [ ! -d "gcc-src/gmp" ]; then
            download_and_extract "GMP ${GMP_VERSION}" "gmp.tar.xz" \
              "https://ftp.gnu.org/gnu/gmp/gmp-${GMP_VERSION}.tar.xz" \
              "https://mirrors.kernel.org/gnu/gmp/gmp-${GMP_VERSION}.tar.xz"
            mv "gmp-${GMP_VERSION}" gcc-src/gmp || true
          fi

          if [ ! -d "gcc-src/mpfr" ]; then
            download_and_extract "MPFR ${MPFR_VERSION}" "mpfr.tar.xz" \
              "https://ftp.gnu.org/gnu/mpfr/mpfr-${MPFR_VERSION}.tar.xz" \
              "https://mirrors.kernel.org/gnu/mpfr/mpfr-${MPFR_VERSION}.tar.xz"
            mv "mpfr-${MPFR_VERSION}" gcc-src/mpfr || true
          fi

          if [ ! -d "gcc-src/mpc" ]; then
            download_and_extract "MPC ${MPC_VERSION}" "mpc.tar.gz" \
              "https://ftp.gnu.org/gnu/mpc/mpc-${MPC_VERSION}.tar.gz" \
              "https://mirrors.kernel.org/gnu/mpc/mpc-${MPC_VERSION}.tar.gz"
            mv "mpc-${MPC_VERSION}" gcc-src/mpc || true
          fi

          if [ ! -d "gcc-src/isl" ]; then
            download_and_extract "ISL ${ISL_VERSION}" "isl.tar.xz" \
              "https://ftp.gnu.org/gnu/isl/isl-${ISL_VERSION}.tar.xz" \
              "https://mirrors.kernel.org/gnu/isl/isl-${ISL_VERSION}.tar.xz"
            mv "isl-${ISL_VERSION}" gcc-src/isl || true
          fi

          echo "Thirdparty prepared (du):"
          du -sh . || true
          ls -la || true

      - name: Save thirdparty cache (best-effort)
        uses: actions/cache@v4
        with:
          path: thirdparty
          key: thirdparty-${{ runner.os }}-gcc-${{ env.GCC_VERSION }}

      - name: Prepare build dir
        run: |
          set -euo pipefail
          rm -rf build || true
          mkdir -p build
          echo "Contents of thirdparty/gcc-src (before configure):"
          ls -la thirdparty/gcc-src || true

      - name: Configure GCC (host clang, pass brew prefixes)
        run: |
          set -euo pipefail
          SDK="${{ steps.sdk.outputs.sdk }}"
          CORES="${{ steps.cores.outputs.cores }}"
          GMP_PREFIX="${{ steps.brew_prefixes.outputs.gmp_prefix }}"
          MPFR_PREFIX="${{ steps.brew_prefixes.outputs.mpfr_prefix }}"
          MPC_PREFIX="${{ steps.brew_prefixes.outputs.mpc_prefix }}"
          ISL_PREFIX="${{ steps.brew_prefixes.outputs.isl_prefix }}"

          # If brew --prefix variables empty (rare), fallback to standard locations
          if [ -z "$GMP_PREFIX" ]; then GMP_PREFIX="/usr/local"; fi
          if [ -z "$MPFR_PREFIX" ]; then MPFR_PREFIX="/usr/local"; fi
          if [ -z "$MPC_PREFIX" ]; then MPC_PREFIX="/usr/local"; fi
          if [ -z "$ISL_PREFIX" ]; then ISL_PREFIX="/usr/local"; fi

          echo "Using GMP_PREFIX=$GMP_PREFIX MPFR_PREFIX=$MPFR_PREFIX MPC_PREFIX=$MPC_PREFIX ISL_PREFIX=$ISL_PREFIX"
          cd build

          # Build stage1 host compiler with macOS clang (no -isysroot for host)
          export CC="ccache clang"
          export CXX="ccache clang++"
          export CFLAGS="-O2 -pipe -fno-common -g0"
          export CXXFLAGS="$CFLAGS -std=gnu++17"

          # Pass explicit --with-* to configure so it finds headers/libs from brew
          ../thirdparty/gcc-src/configure \
            --build=$(../thirdparty/gcc-src/config.guess) \
            --host=$(../thirdparty/gcc-src/config.guess) \
            --target=${{ env.TARGET }} \
            --prefix=${{ env.PREFIX }} \
            --with-sysroot="${SDK}" \
            --with-gmp="${GMP_PREFIX}" \
            --with-mpfr="${MPFR_PREFIX}" \
            --with-mpc="${MPC_PREFIX}" \
            --with-isl="${ISL_PREFIX}" \
            --enable-languages=c,c++,fortran \
            --disable-bootstrap \
            --disable-multilib \
            --disable-nls \
            --disable-libssp \
            --disable-libquadmath \
            --disable-libgomp \
            --disable-libvtv \
            --disable-libmudflap \
            --enable-threads=posix \
            CC="$CC" CXX="$CXX" CFLAGS="$CFLAGS" CXXFLAGS="$CXXFLAGS"

      - name: Build minimal (all-gcc + libgcc + libgfortran best-effort)
        run: |
          set -euo pipefail
          cd build
          MAKE_J="-j${{ steps.cores.outputs.cores }}"
          echo "make $MAKE_J all-gcc"
          make $MAKE_J all-gcc 2>&1 | tee build_all_gcc.log || ( echo "make all-gcc failed"; tail -n 200 build_all_gcc.log; false )
          make install-gcc DESTDIR=$PWD/${{ env.DESTDIR_REL }} 2>&1 | tee build_install_gcc.log || ( echo "install-gcc failed"; tail -n 200 build_install_gcc.log; false )
          echo "make $MAKE_J all-target-libgcc"
          make $MAKE_J all-target-libgcc 2>&1 | tee build_libgcc.log || ( echo "all-target-libgcc failed"; tail -n 200 build_libgcc.log; false )
          make install-target-libgcc DESTDIR=$PWD/${{ env.DESTDIR_REL }} 2>&1 | tee build_install_libgcc.log || ( echo "install-target-libgcc failed"; tail -n 200 build_install_libgcc.log; false )
          echo "Attempt libgfortran (may fail on some setups)"
          make $MAKE_J all-target-libgfortran 2>&1 | tee build_libgfortran.log || echo "all-target-libgfortran failed (nonfatal)"
          make install-target-libgfortran DESTDIR=$PWD/${{ env.DESTDIR_REL }} 2>&1 | tee build_install_libgfortran.log || echo "install-target-libgfortran failed (nonfatal)"

      - name: Strip & reduce artifact size
        run: |
          set -euo pipefail
          IR="build/${{ env.DESTDIR_REL }}"
          TARGETROOT="${IR}${{ env.PREFIX }}"
          echo "Installroot size before cleanup:"
          du -sh "$IR" || true
          rm -rf "$TARGETROOT"/share/man || true
          rm -rf "$TARGETROOT"/share/doc || true
          echo "Installroot size after cleanup:"
          du -sh "$IR" || true

      - name: Basic sanity listing
        run: |
          set -euo pipefail
          if [ -d "build/${{ env.DESTDIR_REL }}${{ env.PREFIX }}" ]; then
            echo "Top-level install (sample):"
            find build/${{ env.DESTDIR_REL }}${{ env.PREFIX }} -maxdepth 3 -ls || true
          else
            echo "Installroot missing; listing build dir"
            find build -maxdepth 4 -ls || true
          fi

      - name: Install fpm (macOS)
        run: |
          set -euo pipefail
          gem install --no-document fpm || true

      - name: Build .deb + zip
        run: |
          set -euo pipefail
          cd build/${{ env.DESTDIR_REL }}
          fpm -s dir -t deb -n gcc-ios -v "${{ env.GCC_VERSION }}" --architecture arm64 \
            --description "GCC + G++ + GFortran for aarch64-apple-ios (prefix /usr/local/gcc-ios)" \
            usr/local/gcc-ios
          mkdir -p release
          mv *.deb release/ || true
          zip -r release/gcc-ios-${{ env.GCC_VERSION }}-deb.zip release/*.deb || true
          ls -lah release || true

      - name: Upload artifact (release)
        uses: actions/upload-artifact@v4
        with:
          name: gcc-ios-release
          path: build/${{ env.DESTDIR_REL }}/release

      - name: Create GitHub Release and attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gcc-ios-${{ env.GCC_VERSION }}-${{ github.run_number }}
          files: build/${{ env.DESTDIR_REL }}/release/*
